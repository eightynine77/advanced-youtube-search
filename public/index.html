<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>advanced youtube search - lumigest</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="icon.png">
</head>
<body class="bg-light">
    <div class="position-absolute top-0 end-0 p-3">
        <button id="settings-btn" class="btn btn-sm btn-outline-secondary">
            ⚙️ API and Cache Settings
        </button>
    </div>
    <div class="container pt-5 pb-1">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-danger">advanced youtube search - lumigest</h1>
            <p class="lead text-muted">search youtube with high accuracy</p>
        </div>
        <div class="row justify-content-center mb-3">
            <div class="col-md-8 col-lg-6">
                <div class="search-filter-wrapper">
                    <div class="dropdown">
                        <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="searchFilterDropdown" data-bs-toggle="dropdown" aria-expanded="false">match words (default)</button>
                        <ul class="dropdown-menu" aria-labelledby="searchFilterDropdown">
                            <li><a class="dropdown-item active" href="#" data-value="default">match words (default)</a></li>
                            <li><a class="dropdown-item" href="#" data-value="phrase">match whole Word</a></li>
                            <li><a class="dropdown-item" href="#" data-value="exact">exact title</a></li>
                        </ul>
                    </div>
                    <small class="text-muted" id="filter-description">
                        search for videos containing all your keywords.
                    </small>
                </div>
                <div class="d-flex flex-wrap gap-2 mb-3" id="date-filter-wrapper">
                    <div class="flex-grow-1">
                            <label for="date-after" class="form-label small text-muted mb-0">After (MM-DD-YYYY):</label>
                            <div class="input-group input-group-sm">
                                <input type="text" id="date-after" class="form-control" value="MM-DD-YYYY" aria-label="Date after" style="caret-color: transparent;" inputmode="numeric">
                                <button class="btn btn-outline-secondary open-calendar-btn" type="button" data-target="date-after">📅</button>
                            </div>
                        </div>
                        <div class="flex-grow-1">
                            <label for="date-before" class="form-label small text-muted mb-0">Before (MM-DD-YYYY):</label>
                            <div class="input-group input-group-sm">
                                <input type="text" id="date-before" class="form-control" value="MM-DD-YYYY" aria-label="Date before" style="caret-color: transparent;" inputmode="numeric">
                                <button class="btn btn-outline-secondary open-calendar-btn" type="button" data-target="date-before">📅</button>
                            </div>
                        </div>
                        <div class="d-flex align-items-end">
                            <button id="clear-dates-button" class="btn btn-outline-secondary btn-sm" type="button" style="height: 31px;">Clear</button>
                        </div>
                    </div>
                <div class="input-group input-group-lg shadow-sm">
                    <input type="text" id="search-input" class="form-control" placeholder="Enter video title..." aria-label="Search term" tabindex="1">
                    <button id="search-button" class="btn btn-danger" type="button" tabindex="2">search</button>
                    <button id="stop-button" class="btn btn-secondary" type="button" tabindex="3">stop</button>
                </div>
                <div class="d-flex justify-content-end mt-2">
                    <button id="remove-duplicates-button" class="btn btn-sm" type="button">
                        🧹 remove duplicate search results
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div id="removed-duplicates-status" class="text-center mb-3 fw-bold text-secondary"></div>
    <div id="search-status" class="text-center mb-3 fw-bold text-secondary"></div>
    <div class="container pb-5" style="overflow-x: hidden;">
        <div id="results-container" class="row g-4 w-100 mx-0"></div>
    </div>
    </div>
    <div id="api-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <button id="close-modal-btn" class="close-btn">&times;</button>
            
            <h4 class="mb-3">API and Cache Settings</h4>
            
            <div class="d-flex align-items-center justify-content-between mb-3">
                <span class="fw-bold">Use your own API Key</span>
                <label class="custom-switch">
                    <input type="checkbox" id="api-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
    
            <div class="mb-2">
                <label for="user-api-key" class="form-label small text-muted">Your YouTube API Key</label>
                <input type="text" id="user-api-key" class="form-control custom-input" placeholder="Paste your key here..." disabled>
            </div>
            <button id="save-settings-btn" class="btn w-100">Save Settings</button>
            <hr class="my-4">
            <h5 class="mb-2 fw-bold">Search Cache Management</h5>
            
            <div class="d-flex flex-column gap-1 mb-1">
                <textarea id="cache-text-area" class="form-control" rows="7" placeholder="Paste cache JSON here, or click 'Copy Text' to view..."></textarea>
                <button id="load-cache-btn" class="btn btn-outline-info btn-sm w-100">👁️ Show Search Cache</button>
                <div id="cache-status-message" class="text-center small fw-bold mt-2" style="min-height: 20px;"></div>
                
                <div class="d-flex gap-2">
                    <button id="copy-cache-btn" class="btn btn-outline-secondary btn-sm flex-fill">📋 Copy Text</button>
                    <button id="import-text-btn" class="btn btn-outline-primary btn-sm flex-fill">📥 Import Text</button>
                </div>

                <div class="text-center text-muted small" style="font-size: 1.2em">or</div>
                
                <div class="d-flex gap-2">
                    <button id="export-file-btn" class="btn btn-outline-secondary btn-sm flex-fill">💾 Export File</button>
                    <button id="import-file-trigger" class="btn btn-outline-primary btn-sm flex-fill">📂 Import File</button>
                    <input type="file" id="import-file-input" class="d-none" accept=".json">
                </div>
            </div>
            <hr class="my-4">
            <h5 class="mb-2 fw-bold">Delete Search Cache</h5>
            <button id="clear-cache-btn" class="btn w-100">Delete</button>
        </div>
    </div>
    <div id="calendar-modal" class="modal-overlay hidden">
        <div class="modal-box" style="max-width: 350px;">
            <button id="close-calendar-btn" class="close-btn">&times;</button>
            
            <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
                <button id="prev-month-btn" class="btn btn-sm btn-outline-secondary">&lt;</button>
                <div class="d-flex align-items-center justify-content-center gap-2">
                    <input type="text" id="calendar-month-input" list="month-list" class="form-control form-control-sm fw-bold text-center text-dark" style="width: 105px; font-size: 1rem;" placeholder="Month">
                    <datalist id="month-list">
                        <option value="January"></option>
                        <option value="February"></option>
                        <option value="March"></option>
                        <option value="April"></option>
                        <option value="May"></option>
                        <option value="June"></option>
                        <option value="July"></option>
                        <option value="August"></option>
                        <option value="September"></option>
                        <option value="October"></option>
                        <option value="November"></option>
                        <option value="December"></option>
                    </datalist>
                    
                    <input type="number" id="calendar-year-input" class="form-control form-control-sm fw-bold text-center text-dark" style="width: 75px; font-size: 1rem;" min="1970" max="2100">
                </div>
                <button id="next-month-btn" class="btn btn-sm btn-outline-secondary">&gt;</button>
            </div>
            
            <div class="d-flex text-center fw-bold text-muted small mb-2">
                <div style="width: 14.28%;">Su</div>
                <div style="width: 14.28%;">Mo</div>
                <div style="width: 14.28%;">Tu</div>
                <div style="width: 14.28%;">We</div>
                <div style="width: 14.28%;">Th</div>
                <div style="width: 14.28%;">Fr</div>
                <div style="width: 14.28%;">Sa</div>
            </div>
            
            <div id="calendar-days" class="d-flex flex-wrap text-center"></div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
